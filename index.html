<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>ObjectiveCheat V1.0 | CS2</title>
  <!-- Font Awesome 6 for minimal icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0a0f0a;
      background-image: radial-gradient(circle at 30% 20%, #0f1a0f 0%, #030503 100%);
      color: #d4ffd4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.2rem;
      margin: 0;
      position: relative;
      letter-spacing: 0.2px;
    }

    /* subtle grid background */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(0, 255, 65, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 65, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 0;
    }

    /* main card – zoomed out, minimalistic */
    .main-container {
      max-width: 1100px;
      width: 100%;
      background: rgba(8, 14, 8, 0.75);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(0, 255, 100, 0.25);
      border-radius: 3rem;
      padding: 2.2rem 2.5rem;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(0, 255, 80, 0.1), 0 0 60px rgba(0, 255, 60, 0.15);
      position: relative;
      z-index: 5;
      transition: all 0.25s ease;
      animation: fadeSlide 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      transform: scale(0.98);
    }

    @keyframes fadeSlide {
      0% { opacity: 0; transform: translateY(18px) scale(0.96); }
      100% { opacity: 1; transform: translateY(0) scale(0.98); }
    }

    /* header with logo – top corner */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2.2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo-box {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      background: rgba(5, 12, 5, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 0.45rem 1.8rem 0.45rem 1.3rem;
      border-radius: 3rem;
      border: 1px solid rgba(0, 255, 85, 0.4);
      box-shadow: 0 0 22px rgba(0, 255, 65, 0.3);
      transition: 0.3s;
    }

    .logo-box:hover {
      box-shadow: 0 0 35px rgba(0, 255, 80, 0.65);
      border-color: #2eff6e;
    }

    /* logo image – replace with your .png */
    .logo-img {
      height: 38px;
      width: 38px;
      object-fit: contain;
      border-radius: 8px;
      filter: drop-shadow(0 0 6px #00ff4c);
      transition: transform 0.3s ease;
    }

    .logo-box:hover .logo-img {
      transform: rotate(-5deg) scale(1.08);
    }

    .logo-text {
      font-weight: 650;
      font-size: 1.7rem;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #bbffbb, #4eff6e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 10px #00d43c;
      font-family: 'Inter', sans-serif;
    }

    .version-tag {
      background: rgba(0, 20, 5, 0.7);
      border-radius: 20px;
      padding: 0.3rem 1.3rem;
      font-size: 0.8rem;
      font-weight: 600;
      border: 1px solid #2eff59;
      color: #c9ffce;
      margin-left: 0.2rem;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: #a5ffb2;
      font-size: 0.9rem;
    }

    /* minimal description */
    .description-block {
      margin: 1.5rem 0 2.5rem;
      text-align: center;
    }

    .desc-text {
      font-size: 1.15rem;
      max-width: 650px;
      margin: 0 auto;
      background: rgba(10, 20, 10, 0.55);
      backdrop-filter: blur(10px);
      padding: 1.1rem 2.2rem;
      border-radius: 3rem;
      border-left: 3px solid #1eff5e;
      color: #c8ffcf;
      font-weight: 400;
      box-shadow: 0 12px 22px -10px rgba(0,0,0,0.7);
      letter-spacing: 0.2px;
    }

    .desc-text i {
      color: #2eff6a;
      margin: 0 0.25rem;
    }

    /* screenshot section title */
    .section-title {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 1.2rem;
      font-weight: 500;
      margin-bottom: 1.6rem;
      color: #b4ffc2;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    /* screenshots grid – clean and minimal */
    .screenshots-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 1.6rem;
      margin: 1.5rem 0 2.4rem;
    }

    .screenshot-card {
      background: rgba(7, 16, 7, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 2rem;
      padding: 0.9rem;
      border: 1px solid rgba(0, 255, 90, 0.25);
      transition: all 0.3s ease;
      box-shadow: 0 12px 24px -8px rgba(0,0,0,0.7);
      display: flex;
      flex-direction: column;
      animation: cardUp 0.7s ease backwards;
    }

    .screenshot-card:nth-child(1) { animation-delay: 0.05s; }
    .screenshot-card:nth-child(2) { animation-delay: 0.2s; }
    .screenshot-card:nth-child(3) { animation-delay: 0.35s; }

    @keyframes cardUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .screenshot-card:hover {
      transform: translateY(-6px);
      border-color: #2eff6b;
      box-shadow: 0 22px 30px -10px rgba(0, 255, 60, 0.45);
      background: rgba(12, 24, 12, 0.7);
    }

    /* image container – replace src with your .png screenshots */
    .menu-shot {
      width: 100%;
      aspect-ratio: 16 / 10;
      background: #0b130b;
      border-radius: 1.4rem;
      overflow: hidden;
      border: 1px solid #2b4a2b;
      margin-bottom: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #0c180c, #030b03);
      box-shadow: inset 0 0 20px rgba(0, 20, 0, 0.8);
      transition: border 0.2s;
    }

    .screenshot-card:hover .menu-shot {
      border-color: #1eff5e;
      box-shadow: inset 0 0 30px rgba(0, 255, 70, 0.25);
    }

    .shot-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }

    .screenshot-card:hover .shot-img {
      transform: scale(1.03);
    }

    .shot-label {
      text-align: center;
      font-weight: 500;
      font-size: 0.9rem;
      color: #bbffc4;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      letter-spacing: 0.3px;
    }

    .shot-label i {
      color: #3eff6a;
      font-size: 0.9rem;
    }

    /* minimal features row */
    .features-mini {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 1.2rem;
    }

    .feature-bubble {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(12, 22, 12, 0.65);
      backdrop-filter: blur(8px);
      padding: 0.55rem 1.7rem;
      border-radius: 2.5rem;
      border: 1px solid #28733a;
      font-weight: 450;
      color: #c3ffcc;
      transition: 0.25s;
      animation: softPulse 2.6s infinite alternate;
    }

    .feature-bubble i {
      color: #2eff59;
    }

    @keyframes softPulse {
      0% { border-color: #2c6e3a; box-shadow: 0 0 6px #0f3; }
      100% { border-color: #48ff6b; box-shadow: 0 0 16px #1aff4b; }
    }

    .footer-line {
      margin-top: 2.2rem;
      text-align: center;
      color: #6f9e77;
      font-size: 0.8rem;
      border-top: 1px solid #1f3a22;
      padding-top: 1.6rem;
      letter-spacing: 0.8px;
    }

    /* utility for placeholder image if no src */
    .placeholder-logo {
      background: #0a1f0a;
      color: #1eff5e;
      font-size: 1.1rem;
    }

    @media (max-width: 650px) {
      .main-container {
        padding: 1.6rem;
      }
      .logo-text {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>
  <div class="main-container">
    
    <!-- Header: Logo at top corner (replace logo.png with your file) -->
    <div class="header">
      <div class="logo-box">
        <!-- REPLACE src below with your logo .png -->
        <img src="logo.png" alt="ObjectiveCheat Logo" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
        <!-- fallback icon if logo.png missing (hidden by default) -->
        <div style="display: none; width:38px; height:38px; border-radius:8px; background:#0b1a0b; align-items:center; justify-content:center; color:#1eff5e; font-size:1.5rem;">
          <i class="fas fa-crosshairs"></i>
        </div>
        <span class="logo-text">ObjectiveCheat</span>
        <span class="version-tag">1.0</span>
      </div>
      <div class="status-indicator">
        <i class="fas fa-circle" style="color: #1eff5e; font-size: 0.55rem; text-shadow: 0 0 8px #0f0;"></i>
        <span>BETA</span>
      </div>
    </div>

    <!-- Minimalistic description -->
    <div class="description-block">
      <div class="desc-text">
        <i class="fas fa-ghost"></i> 
        <strong>ObjectiveCheat V1.0</strong> — pure precision. 
        Minimal external CS2 cheat with <span style="color:#8eff9e;">streamproof ESP</span>, 
        <span style="color:#8eff9e;">legit aimbot</span>, and intuitive interface. 
        <i class="fas fa-bolt"></i>
      </div>
    </div>

    <!-- Screenshots grid with .png images (replace src attributes) -->
    <div class="section-title">
      <i class="fas fa-images"></i> <span>interface</span>
    </div>

    <div class="screenshots-grid">
      <!-- Screenshot 1: replace with your menu1.png -->
      <div class="screenshot-card">
        <div class="menu-shot">
          <img src="menu_aimbot.png" alt="Aimbot menu" class="shot-img" onerror="this.style.display='none'; this.parentElement.innerHTML='<div style=\'color:#1a3a1a; display:flex; align-items:center; justify-content:center; height:100%;\'><i class=\'fas fa-image\' style=\'font-size:2rem; opacity:0.5;\'></i></div>';">
        </div>
        <div class="shot-label">
          <i class="fas fa-bullseye"></i> Aimbot
        </div>
      </div>

      <!-- Screenshot 2: visuals / ESP -->
      <div class="screenshot-card">
        <div class="menu-shot">
          <img src="menu_visuals.png" alt="Visuals menu" class="shot-img" onerror="this.style.display='none'; this.parentElement.innerHTML='<div style=\'color:#1a3a1a; display:flex; align-items:center; justify-content:center; height:100%;\'><i class=\'fas fa-image\' style=\'font-size:2rem; opacity:0.5;\'></i></div>';">
        </div>
        <div class="shot-label">
          <i class="fas fa-eye"></i> Visuals
        </div>
      </div>

      <!-- Screenshot 3: misc / config -->
      <div class="screenshot-card">
        <div class="menu-shot">
          <img src="menu_misc.png" alt="Misc settings" class="shot-img" onerror="this.style.display='none'; this.parentElement.innerHTML='<div style=\'color:#1a3a1a; display:flex; align-items:center; justify-content:center; height:100%;\'><i class=\'fas fa-image\' style=\'font-size:2rem; opacity:0.5;\'></i></div>';">
        </div>
        <div class="shot-label">
          <i class="fas fa-sliders-h"></i> Misc
        </div>
      </div>
    </div>

    <!-- Animated minimal features -->
    <div class="features-mini">
      <div class="feature-bubble">
        <i class="fas fa-microchip"></i> <span>External</span>
      </div>
      <div class="feature-bubble">
        <i class="fas fa-user-shield"></i> <span>Streamproof</span>
      </div>
      <div class="feature-bubble">
        <i class="fas fa-sync-alt"></i> <span>Legit</span>
      </div>
      <div class="feature-bubble">
        <i class="fas fa-fingerprint"></i> <span>Low VAC ban chances</span>
      </div>
    </div>

    <div class="footer-line">
      <i class="far fa-clock" style="margin-right: 0.3rem;"></i> ObjectiveCheat V1.0
    </div>
  </div>
</body>
</html>
